# AICN site-scoped search targets (v1 refinement to the L2 broad-search layer).
#
# These are large, high-volume mainstream outlets where AI-in-campaigns news
# is real but low-density relative to their overall output — too much to
# ingest as a full RSS feed, but too important to leave to chance on the
# generic broad web_search pass alone.
#
# 2026-07 restructure: all due targets are now covered by ONE consolidated
# web_search call per run using the tool's allowed_domains parameter (see
# gather_search.py), instead of one `site:<domain>` call each. 28 runs of
# attribution data showed 7 of 11 targets produced zero published items, so
# per-target calls were over-provisioned. The Downballot moved to sources.yaml
# (it has a native RSS feed at the-downballot.com/feed — free beats paid).
#
# Removed 2026-07-21: politico.com and apnews.com — both block Anthropic's
# crawler, so web_search could never excerpt their pages (allowed_domains
# rejects them outright, and both produced zero published items in 28 runs of
# the old per-site calls). Their stories reach us via syndication through the
# broad search, GDELT, and feeds. gather_search.py also strips any domain the
# API reports as crawler-blocked at runtime, in case others change policy.
#
# Source: tier (b) of the "Campaign News & Source Directory" mapping from the
# 2026-06-30 planning session (ai_campaigns_digest_site_build_prompt.md).
# cadence follows the same daily/weekly convention as watchlist.yaml.

targets:
  - id: axios
    name: Axios
    domain: axios.com
    cadence: daily
  - id: semafor
    name: Semafor
    domain: semafor.com
    cadence: daily
  - id: the-hill
    name: The Hill
    domain: thehill.com
    cadence: daily
  - id: punchbowl
    name: Punchbowl News
    domain: punchbowl.news
    cadence: daily
  - id: the-dispatch
    name: The Dispatch
    domain: thedispatch.com
    cadence: daily
  - id: ai-campaign-stack
    name: AI Campaign Stack
    domain: aicampaignstack.org
    cadence: daily
  - id: chaotic-era
    name: Chaotic Era
    domain: chaoticera.news
    cadence: daily
  - id: civic-shout
    name: Civic Shout Newsletter
    domain: civicshoutnewsletter.com
    cadence: daily

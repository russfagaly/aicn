# AICN entity watchlist (Layer-3 hook, used in v1 as discovery.method = "watchlist").
# Each entity is covered by a grouped web_search call each run (~5 entities per
# call — see gather_search.py). Seeded from the build plan's vendor/regulator/
# legislation list, plus outlets that had no usable RSS feed (see sources.yaml
# `unavailable`) and are covered here via search instead.
#
# cadence: "daily" runs every time; "weekly" runs once a week on `weekday`
# (Monday=0 ... Sunday=6, per Python's date.weekday()). The 2026-06/07 weekly
# rotation existed purely to cap per-entity search cost; after the 2026-07
# discovery restructure (grouped entity calls + Batch API), all-daily coverage
# costs less than the old rotation did, so everything moved back to daily.
# Attribution data supported this: weekly-rotated entities produced 5 published
# items despite only 1-day-in-7 coverage. The cadence mechanism is kept in
# case cost pressure ever returns.

entities:
  - id: ngpvan-bonterra
    name: NGP VAN / Bonterra
    kind: vendor
    cadence: daily
